<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my talking lizard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>my talking lizard</h1>
    <div id="stage">
      <img
        id="background"
        class="layer"
        src="sprites/general/background.png"
        alt=""
      />
      <img id="chair" class="layer" src="sprites/general/chair.png" alt="" />
      <div id="character" class="layer">
        <img
          id="body"
          class="layer"
          src="sprites/lizard/lizard_body.png"
          alt=""
        />

        <img
          id="left-eye-open"
          class="layer face"
          src="sprites/lizard/lizard_left_eye_open.png"
          alt=""
        />
        <img
          id="left-eye-closed"
          class="layer face hidden"
          src="sprites/lizard/lizard_left_eye_closed.png"
          alt=""
        />
        <img
          id="right-eye-open"
          class="layer face"
          src="sprites/lizard/lizard_right_eye_open.png"
          alt=""
        />
        <img
          id="right-eye-closed"
          class="layer face hidden"
          src="sprites/lizard/lizard_right_eye_closed.png"
          alt=""
        />

        <img
          id="mouth-closed"
          class="layer face"
          src="sprites/lizard/lizard_mouth.png"
          alt=""
        />
        <img
          id="mouth-open"
          class="layer face hidden"
          src="sprites/lizard/lizard_mouth_open.png"
          alt=""
        />
        <img
          id="tongue"
          class="layer face hidden"
          src="sprites/lizard/lizard_tongue.png"
          alt=""
        />
      </div>
    </div>

    <div id="buttons">
      <button id="talk">Talk</button>
      <button id="ask">Ask Question</button>
      <button id="food">Food</button>
    </div>

    <div id="buttons-2" class="hidden">
      <button id="coalition" disabled>
        <span id="coalition-fill"></span>
        <span id="coalition-label">
          Summon the Coalition
          <small id="coalition-cost">15 food</small>
        </span>
      </button>
      <button id="plinko-unlock" disabled>
        <span id="plinko-unlock-fill"></span>
        <span id="plinko-unlock-label">
          Unlock Jahorse Plinko
          <small>1000 food</small>
        </span>
      </button>
    </div>
    <label id="mute-munch-toggle">
      <input type="checkbox" id="mute-munch" />
      mute munching sounds
    </label>
    <label id="normal-size-toggle" class="hidden">
      <input type="checkbox" id="normal-size" />
      make him normal sized
    </label>
    <p id="food-count">Food: 0</p>

    <div id="plinko-panel" class="hidden">
      <h1 id="plinko-title">jahorse plinko</h1>
      <div id="plinko-board-wrap">
        <canvas id="plinko-board" width="500" height="640"></canvas>
      </div>
      <div id="plinko-controls">
        <button id="plinko-drop" disabled>
          <span id="plinko-drop-fill"></span>
          <span class="plinko-btn-label">
            Drop a jahorse
            <small>500 food</small>
          </span>
        </button>
        <button id="plinko-drop5" disabled>
          <span id="plinko-drop5-fill"></span>
          <span class="plinko-btn-label">
            Drop 5
            <small>2500 food</small>
          </span>
        </button>
      </div>
    </div>

    <footer id="version">v2.1</footer>

    <div id="debug-panel" class="hidden">
      <div class="debug-row">
        <button id="debug-add-food">Add Food</button>
        <input id="debug-food-amount" type="number" value="50" min="1" />
      </div>
      <div class="debug-row">
        <button id="debug-add-clones">Summon Clones</button>
        <input id="debug-clone-amount" type="number" value="1" min="1" />
      </div>
    </div>

    <script data-goatcounter="https://mytalkinggsgw.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="plinko.js"></script>
    <script src="main.js"></script>
  </body>
</html>
