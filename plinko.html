<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horse Plinko</title>
    <link rel="stylesheet" href="plinko.css" />
  </head>
  <body>
    <h1>Horse Plinko</h1>

    <div id="hud">
      <span id="score">Score: 0</span>
      <span id="dropped">Horses dropped: 0</span>
    </div>

    <div id="board-wrap">
      <canvas id="board" width="500" height="640"></canvas>
    </div>

    <div id="controls">
      <button id="drop">Drop a horse</button>
      <button id="drop-many">Drop 5</button>
      <button id="reset">Reset</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="plinko.js"></script>
  </body>
</html>
